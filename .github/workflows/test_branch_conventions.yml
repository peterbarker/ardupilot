name: Test for Malformed Commits in PR Branch

on:
  push:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: ci-${{github.workflow}}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-merge-commits:
    runs-on: ubuntu-latest
    container: ardupilot/ardupilot-dev-chibios:v0.1.3

    steps:
      - name: Checkout branch
        uses: actions/checkout@v6
        with:
          submodules: 'false'
          fetch-depth: 0

      - name: Fetch base branch (ArduPilot master)
        shell: bash
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git remote add upstream https://github.com/ArduPilot/ardupilot 2>/dev/null || \
            git remote set-url upstream https://github.com/ArduPilot/ardupilot
          git fetch --no-tags upstream master
          git log -1 upstream/master --oneline

      - name: Update submodules
        run: |
          git submodule update --init --recursive

      - name: Install aarch64 cross toolchain for Linux board checks
        shell: bash
        run: |
          apt-get update
          apt-get install -y g++-aarch64-linux-gnu

      - name: Install markdownlint-cli2
        shell: bash
        run: |
          apt-get update && apt-get install -y npm
          npm install -g markdownlint-cli2@0.4.0

      - name: Check branch conventions
        shell: bash
        run: |
          Tools/scripts/check_branch_conventions.py --base-branch "upstream/master"

      - name: Test new boards compile
        if: ${{ always() }}
        shell: bash
        run: |
          Tools/scripts/test_new_boards.py --master-branch "upstream/master"
